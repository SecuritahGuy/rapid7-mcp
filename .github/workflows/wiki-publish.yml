name: Wiki Publish

on:
  push:
    branches: [main]
    paths:
      - docs/wiki/**
      - scripts/publish_wiki.sh
      - .github/workflows/wiki-publish.yml
  pull_request:
    branches: [main]
    paths:
      - docs/wiki/**
      - scripts/publish_wiki.sh
      - .github/workflows/wiki-publish.yml
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to GitHub Wiki"
        type: boolean
        default: false
      clean:
        description: "Delete stale wiki markdown pages not present in docs/wiki"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Wiki Sync Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Preview wiki sync (dry-run)
        run: scripts/publish_wiki.sh

  publish:
    name: Wiki Publish (Protected)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preview]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    environment:
      name: wiki-publish
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Publish wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALLOW_MISSING_WIKI: "true"
        run: |
          args=(--push)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.clean }}" == "true" ]]; then
            args+=(--clean)
          fi
          scripts/publish_wiki.sh "${args[@]}"
